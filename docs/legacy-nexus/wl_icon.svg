<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy rounded background -->
  <rect width="32" height="32" rx="6" fill="#1B3A6B"/>
  <!-- Tall pillar — light blue, rounded top -->
  <rect x="7" y="6" width="5" height="18" rx="2.5" fill="#D0E4FF"/>
  <!-- Short pillar — mid blue, rounded top -->
  <rect x="14" y="11" width="5" height="13" rx="2.5" fill="#6B9DC7"/>
  <!-- WL text -->
  <text x="20.5" y="23.5"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="9.5"
        fill="#D0E4FF"
        letter-spacing="-0.8">WL</text>
  <!-- Base bar -->
  <rect x="6" y="25.5" width="20" height="2" rx="1" fill="#6B9DC7"/>
</svg>
